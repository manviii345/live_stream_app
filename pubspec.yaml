name: live_stream_app
description: A live streaming camera app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  flutter_riverpod: ^2.5.1

  camera: ^0.10.6
  permission_handler: ^11.3.1

  mobile_scanner: ^5.0.0
  shared_preferences: ^2.3.0

  # WebRTC & Janus streaming
  flutter_webrtc: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true